<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heartfelt wishes </title>
    <style>
        /* 1. 極致深邃黑背景 */
        body {
            margin: 0;
            height: 100vh;
            background-color: #030303; /* 比原本更暗一點，為了凸顯光芒 */
            overflow: hidden; /* 防止手機螢幕滑動 */
            position: relative;
        }

        /* 2. 魔法師的容器定位 (固定在左下角) */
        .wizard-container {
            position: absolute;
            bottom: 2vh;  /* 距離底部一點點 */
            left: -5vw;   /* 稍微靠左，依照手機比例微調 */
            width: 55vw;  /* 控制魔法師在手機上的大小 */
            max-width: 250px;
            z-index: 10;
        }

        /* 3. 魔法師圖片設定 */
        .wizard-img {
            width: 100%;
            height: auto;
            display: block;
            /* 神級屬性：濾色模式。讓圖片的黑底變透明，完美融入網頁黑底 */
            mix-blend-mode: screen; 
            opacity: 0.85; /* 讓魔法師稍微暗一點，凸顯魔杖的光 */
        }

        /* 4. 哈利波特 Lumos 魔法光球效果 */
        .lumos-light {
            position: absolute;
            /* ⚠️ 關鍵座標：你需要微調這兩個數字，讓光球剛好對準魔杖頂端 */
            top: 20%;  
            right: 14%; 
            
            width: 12px;
            height: 12px;
            background-color: #ffffff;
            border-radius: 50%;
            
            /* 強烈的多層次發光效果 (白核心 -> 微微偏藍的強烈外暈) */
            box-shadow: 
                0 0 15px 5px rgba(255, 255, 255, 1),
                0 0 30px 15px rgba(200, 220, 255, 0.8),
                0 0 60px 30px rgba(100, 150, 255, 0.4);
                
            /* 忽閃忽滅的呼吸動畫 */
            animation: lumosPulse 1.5s infinite alternate ease-in-out;
        }

        /* Lumos 動畫關鍵影格 */
        @keyframes lumosPulse {
            0% { 
                transform: scale(0.9); 
                opacity: 0.8; 
                box-shadow: 0 0 10px 3px rgba(255,255,255,0.8), 0 0 20px 10px rgba(200,220,255,0.6); 
            }
            100% { 
                transform: scale(1.3); 
                opacity: 1; 
                box-shadow: 0 0 20px 8px rgba(255,255,255,1), 0 0 40px 20px rgba(200,220,255,0.9), 0 0 80px 40px rgba(100,150,255,0.5); 
            }
        }
    </style>
</head>
<body>

    <div class="wizard-container">
        <img src="wizard_4x.png" alt="魔法師" class="wizard-img">
        <div class="lumos-light"></div>
    </div>

</body>
</html>
